<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI房屋估价系统 | 智能预测</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #10b981;
            --accent: #f59e0b;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --border: #e5e7eb;
            --shadow: 0 10px 25px -3px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            --radius: 12px;
            --radius-lg: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .app-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .hero-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 500px;
            padding: 60px 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(99, 102, 241, 0.1), transparent);
            animation: shimmer 8s infinite linear;
        }

        .logo {
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .logo-icon::before {
            content: '🏠';
            font-size: 32px;
            filter: grayscale(1) brightness(2);
        }

        .logo h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .feature {
            text-align: center;
            padding: 20px;
            background: rgba(99, 102, 241, 0.05);
            border-radius: var(--radius);
            transition: transform 0.3s ease;
        }

        .feature:hover {
            transform: translateY(-2px);
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            margin: 0 auto 12px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .feature h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .feature p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .cta-button {
            width: 100%;
            padding: 16px 32px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-card > * {
            animation: fadeInUp 0.6s ease-out;
        }

        .hero-card > *:nth-child(1) { animation-delay: 0.1s; }
        .hero-card > *:nth-child(2) { animation-delay: 0.2s; }
        .hero-card > *:nth-child(3) { animation-delay: 0.3s; }
        .hero-card > *:nth-child(4) { animation-delay: 0.4s; }
        .hero-card > *:nth-child(5) { animation-delay: 0.5s; }

        @media (max-width: 768px) {
            .hero-card {
                padding: 40px 20px;
                margin: 20px;
            }

            .features {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .stats {
                flex-direction: column;
                gap: 20px;
            }

            .logo h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="hero-card">
            <div class="logo">
                <div class="logo-icon"></div>
                <h1>AI房屋估价系统</h1>
                <p class="tagline">基于机器学习算法的智能房价预测平台<br>为您提供精准、可靠的房屋价值评估</p>
            </div>

            <div class="features">
                <div class="feature">
                    <div class="feature-icon">⚡</div>
                    <h3>实时分析</h3>
                    <p>基于最新市场数据</p>
                </div>
                <div class="feature">
                    <div class="feature-icon">🔍</div>
                    <h3>精准预测</h3>
                    <p>机器学习算法驱动</p>
                </div>
                <div class="feature">
                    <div class="feature-icon">📊</div>
                    <h3>多维评估</h3>
                    <p>全面考虑房屋特征</p>
                </div>
                <div class="feature">
                    <div class="feature-icon">🛡️</div>
                    <h3>安全可靠</h3>
                    <p>数据隐私保护</p>
                </div>
            </div>

            <button class="cta-button" onclick="startPrediction()">
                开始房屋估价
            </button>

            <div class="stats">
                <div class="stat">
                    <div class="stat-number">99.2%</div>
                    <div class="stat-label">预测准确率</div>
                </div>
                <div class="stat">
                    <div class="stat-number">10K+</div>
                    <div class="stat-label">成功案例</div>
                </div>
                <div class="stat">
                    <div class="stat-number">＜3s</div>
                    <div class="stat-label">响应时间</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function startPrediction() {
            window.location.href = '/predict-page';
        }

        // 添加页面加载动画
        document.addEventListener('DOMContentLoaded', function() {
            document.body.style.opacity = '0';
            setTimeout(() => {
                document.body.style.transition = 'opacity 0.5s ease';
                document.body.style.opacity = '1';
            }, 100);
        });
    </script>
</body>
</html>
